<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Op Core — Login</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%237c6dfa'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='bold' font-size='14' fill='white'>OP</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --accent:   #5865f2;
    --accent2:  #7289da;
    --text:     #e2e2f0;
    --muted:    #5a5a7a;
    --error:    #ed4245;
    --mono:     'Space Mono', monospace;
    --display:  'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(88,101,242,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,101,242,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridshift 20s linear infinite;
    pointer-events: none;
  }

  @keyframes gridshift {
    0%   { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(88,101,242,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 56px 48px;
    width: 420px;
    animation: fadein 0.6s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: var(--display);
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .btn-discord {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-discord:hover  { background: var(--accent2); transform: translateY(-1px); }
  .btn-discord:active { transform: translateY(0); }

  .btn-discord svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

  .error-msg {
    margin-top: 20px;
    padding: 12px;
    border: 1px solid var(--error);
    color: var(--error);
    font-size: 11px;
    letter-spacing: 0.05em;
    display: none;
  }

  .error-msg.show { display: block; }

  .footer {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="tag">// Op Core Dashboard</div>
  <h1>SIGN IN</h1>
  <p class="sub">Restricted access.<br>Only authorized users may enter.</p>

  <a class="btn-discord" href="/auth/login">
    <svg viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg">
      <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
    </svg>
    Continue with Discord
  </a>

  <div class="error-msg" id="err"></div>

  <div class="footer">OP CORE &nbsp;·&nbsp; DEVELOPED BY ABDULLAH</div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const err    = params.get('error');
  const el     = document.getElementById('err');
  if (err === 'unauthorized') {
    el.textContent = '// ACCESS DENIED — You are not authorized.';
    el.classList.add('show');
  } else if (err === 'oauth_failed') {
    el.textContent = '// AUTH ERROR — Try again.';
    el.classList.add('show');
  } else if (err === 'no_code') {
    el.textContent = '// AUTH ERROR — No code returned from Discord. Try again.';
    el.classList.add('show');
  }
</script>
</body>
</html>
